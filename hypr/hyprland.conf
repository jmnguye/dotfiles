###  в•љв•ђв•ќ  в•љв•ђв•ќ   в•љв•ђв•ќ   в•љв•ђв•ќ     в•љв•ђв•ќ  в•љв•ђв•ќв•љв•ђв•ђв•ђв•ђв•ђв•ђв•ќв•љв•ђв•ќ  в•љв•ђв•ќв•љв•ђв•ќ  в•љв•ђв•ђв•ђв•ќв•љв•ђв•ђв•ђв•ђв•ђв•ќ  ###
############################################################################
#

debug {
  disable_logs = false
  enable_stdout_logs = true
}

################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor = eDP-1, preferred, 0x0, 1.33
monitor = DP-10, 2560x1440@143.99Hz, 2256x0, 1

# DГ©finir les workspaces pour l'Г©cran du portable (eDP-1)
workspace = 1, monitor:eDP-1, persistent:true
workspace = 2, monitor:eDP-1, persistent:true
workspace = 3, monitor:eDP-1, persistent:true

# DГ©finir les workspaces pour l'Г©cran externe (DP-10)
workspace = 8, monitor:DP-10, persistent:true
workspace = 9, monitor:DP-10, persistent:true
workspace = 10, monitor:DP-10, persistent:true

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = dolphin
$menu = /home/mxp/.config/rofi/launchers/type-5/launcher.sh
$web-browser = librewolf
$mail = thunderbird

#################
### AUTOSTART ###
#################

exec-once = bash ~/dotfiles/swww/swww.sh
exec-once = bash ~/dotfiles/waybar/start.sh
# clipboard
exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data
exec-once = mako
# authentication agent
exec-once = systemctl --user start plasma-polkit-agent

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# fix cursor disappearing
cursor {
  no_hardware_cursors = true
}

#####################
### LOOK AND FEEL ###
#####################

general { 
    gaps_in = 3
    gaps_out = 3

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(16,15,15,1) rgba(189,26,26,1) 145deg
    # col.inactive_border = rgba(595959aa)
    col.inactive_border = rgba(125,118,118,1)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true 

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = master
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 5

    # Change transparency of focused and unfocused windows
    inactive_opacity = 0.9
    blur {
        enabled = true
        size = 3
        passes = 4
        
        # vibrancy = 0.1696
        vibrancy = 0.1696
    }
}

animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}


# https://wiki.hyprland.org/Configuring/Variables/#misc
misc { 
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}

#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant = intl
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

# https://wiki.hypr.land/Configuring/Variables/
ecosystem {
    no_update_news = true
    no_donation_nag = true
}

###################
### KEYBINDINGS ###
###################

# ALT = ALT # Sets "Windows" key as main modifier

bind = ALT_SHIFT, Q, killactive,
bind = ALT_SHIFT, B, exec, ~/dotfiles/waybar/start.sh
bind = ALT_SHIFT, W, exec, ~/dotfiles/swww/swww.sh
bind = ALT, V, exec, hyprctl dispatch togglefloating; hyprctl dispatch centerwindow; hyprctl dispatch resizeactive exact 80% 80% 
bind = ALT_SHIFT, P, pin, # Ping la fenetre, mais ne fonctionne que sur les fenetres flottante
bind = ALT, F, fullscreen, 1
bind = ALT_SHIFT, F, fullscreen, 0
bind = ALT, M, exec, kitty --class cxxmatrix -e cxxmatrix -m " I use Arch BTW! "
bind = ALT_SHIFT, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
bind = SUPER, L, exec, ~/dotfiles/swaylock/swaylock.sh
bind = ALT, TAB, exec, hyprctl dispatch focusmonitor +1
bind = ALT_SHIFT, TAB, exec, hyprctl dispatch focusmonitor -1
# APPS
bind = ALT, K, exec, $menu
bind = ALT, E, exec, $terminal
bind = ALT, D, exec, $fileManager
bind = ALT, W, exec, $web-browser
bind = ALT, T, exec, $mail 

# Move focus with mainMod + arrow keys
bind = ALT, left, movefocus, l
bind = ALT, right, movefocus, r
bind = ALT, up, movefocus, u
bind = ALT, down, movefocus, d

# Set repeatable binds for resizing the active window.
binde = SUPER, right, resizeactive, 20 0
binde = SUPER, left, resizeactive, -20 0
binde = SUPER, up, resizeactive, 0 -20
binde = SUPER, down, resizeactive, 0 20

# Switch workspaces with mainMod + [0-9]
bind = ALT, 1, workspace, 1
bind = ALT, 2, workspace, 2
bind = ALT, 3, workspace, 3
bind = ALT, 8, workspace, 8
bind = ALT, 9, workspace, 9
bind = ALT, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9] bind = ALT SHIFT, 1, movetoworkspace, 1
bind = ALT SHIFT, 1, movetoworkspace, 1
bind = ALT SHIFT, 2, movetoworkspace, 2
bind = ALT SHIFT, 3, movetoworkspace, 3
bind = ALT SHIFT, 8, movetoworkspace, 8
bind = ALT SHIFT, 9, movetoworkspace, 9
bind = ALT SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = ALT, S, togglespecialworkspace, magic
bind = ALT SHIFT, S, movetoworkspace, special:magic

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = ALT, mouse:272, movewindow
bindm = ALT, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# trigger when the switch is turning on
bindl = , switch:on:Lid Switch, exec, hyprctl keyword monitor "eDP-1, disable"
# trigger when the switch is turning off
bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-1, enable"
# print screen
bind = , PRINT, exec, hyprshot -m region

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules
# windowrulev2 = suppressevent maximize, class:.* # You'll probably like this.
windowrule {
  name = bluetooth
  match:class = blueman-manager 
  float = true
  size = 635 390
}
windowrule {
  name = matrix
  match:class = cxxmatrix
  fullscreen = true
}
windowrule {
  name = audio
  match:class = org.pulseaudio.pavucontrol
  float = true
  size = 795 675
}
